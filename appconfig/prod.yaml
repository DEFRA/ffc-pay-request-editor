---
environment: production
environmentCode: prd
container:
  messageQueueHost: PRDFFCINFSB1001.servicebus.windows.net
  debtTopicAddress: ffc-pay-debt-data
  debtSubscriptionAddress: ffc-pay-request-editor
  manualLedgerTopicAddress: ffc-pay-manual-check-data
  manualLedgerSubscriptionAddress: ffc-pay-request-editor
  qcTopicAddress: ffc-pay-quality-check
  eventsTopicAddress: ffc-pay-events
  debtResponseTopicAddress: ffc-pay-debt-data-response
  azureAppRegistrationRedirectUrl: authenticate
ingress:
  class: nginx
  endpoint: ffc-pay-request-editor-prd
  server: azure.defra.cloud
secretProviderClass:
  azure:
    keyvaultName: PRDFFCINFKV1001
    objects:
      - objectName: prd-ffcahwr-appInsights-connectionString
        objectType: secret
      - objectName: prd-ffc-pay-cookie-password
        objectType: secret
      - objectName: prd-ffcPayRequestEditorClientSecret
        objectType: secret

  secretObjects:
    - secretName: ffc-pay-request-editor
      type: Opaque
      data:
        - objectName: prd-ffcahwr-appInsights-connectionString
          key: APPINSIGHTS_CONNECTIONSTRING
        - objectName: prd-ffc-pay-cookie-password
          key: COOKIE_PASSWORD
        - objectName: prd-ffcPayRequestEditorClientSecret
          key: AZUREID_CLIENT_SECRET