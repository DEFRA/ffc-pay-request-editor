---
environment: production
environmentCode: snd1
container:
  messageQueueHost: SNDFFCINFSB1001.servicebus.windows.net
  debtTopicAddress: ffc-pay-debt-data
  debtSubscriptionAddress: ffc-pay-request-editor
  manualLedgerTopicAddress: ffc-pay-manual-check-data
  manualLedgerSubscriptionAddress: ffc-pay-request-editor
  qcTopicAddress: ffc-pay-quality-check
  eventsTopicAddress: ffc-pay-events
  debtResponseTopicAddress: ffc-pay-debt-data-response
  azureAppRegistrationRedirectUrl: authenticate
ingress:
  class: nginx
  endpoint: ffc-pay-request-editor-snd1
  server: azure.defra.cloud

secretProviderClass:
  azure:
    keyvaultName: SNDFFCINFKV1001
    objects: # reading the secret from Azure Key Vault
      - objectName: appInsights-connectionString # secret name in Azure Key Vault
        objectType: secret
      - objectName: snd1-ffc-pay-cookie-password
        objectType: secret
      - objectName: snd1-ffcPayRequestEditorClientSecret
        objectType: secret

  secretObjects: # creating a Kubernetes secret from the Azure Key Vault secrets
    - secretName: ffc-pay-request-editor
      type: Opaque
      data:
        - objectName: appInsights-connectionString # secret name in Azure Key Vault
          key: APPINSIGHTS_CONNECTIONSTRING # the secret key in the Kubernetes secret and use in the application
        - objectName: snd1-ffc-pay-cookie-password # secret name in Azure Key Vault
          key: COOKIE_PASSWORD # the secret key in the Kubernetes secret and use in the application
        - objectName: snd1-ffcPayRequestEditorClientSecret
          key: AZUREID_CLIENT_SECRET
