# Pipeline name convention
name: '$(Build.SourceBranchName)$(System.PullRequest.SourceBranch)$(Rev:.r)'

# Trigger configuration
trigger:
  - main
  - feature/*
  - release/*

pr:
  - main
  - releases/*

# Parameters
parameters:
  - name: prDeployment
    type: boolean
    default: true
  - name: branchDeployment
    type: boolean
    default: true
  - name: snd2Deployment
    type: boolean
    default: true
  - name: snd1Deployment
    type: boolean
    default: true

# Resources
resources:
  repositories:
    - repository: templates
      endpoint: DEFRA
      type: github
      name: defra/fcp-pipeline-common
      # ref: pl-709   # Optional: build specific pipeline branch

# Pipeline template
extends:
  template: fcp-common-pipeline.yaml@templates
  parameters:
    appFrameworkType: nodejs   # Optional: nodejs (default), dotnet, java
    Type: kubernetes           # Optional: kubernetes (default), npm, functions, nuget
    npmLegacyPeerDeps: false   # Optional: default is false
    dockerFilePath: Dockerfile # Optional default is Dockerfile
    failOnThreshold: moderate  # Optional: moderate (default), low, high, critical
    prDeployment: ${{ parameters.prDeployment }}
    branchDeployment: ${{ parameters.branchDeployment }}
    sndDeployment: ${{ parameters.snd2Deployment }}
    snd1Deployment: ${{ parameters.snd1Deployment }}
    variableGroupName: ffc-pay-request-editor-env-var
    pr_params:
      container.processingActive: $(pr_processingActive)
      container.azureAppRegistrationEnabled: $(pr_azureAppRegistrationEnabled)
      container.azureAppRegistrationClientId: $(pr_azureAppRegistrationClientId)
      container.azureAppRegistrationTenantId: $(pr_azureAppRegistrationTenantId)
      container.bannerEnabled: $(pr_bannerEnabled)
      container.bannerHeader: $(pr_bannerHeader)
      container.bannerText: $(pr_bannerText)
      container.bannerEmail: $(pr_bannerEmail)
    snd1_params:
      container.processingActive: $(snd1_processingActive)
      container.azureAppRegistrationEnabled: $(snd1_azureAppRegistrationEnabled)
      container.azureAppRegistrationClientId: $(snd1_azureAppRegistrationClientId)
      container.azureAppRegistrationTenantId: $(snd1_azureAppRegistrationTenantId)
      container.bannerEnabled: $(snd1_bannerEnabled)
      container.bannerHeader: $(snd1_bannerHeader)
      container.bannerText: $(snd1_bannerText)
      container.bannerEmail: $(snd1_bannerEmail)
    snd2_params:
      container.processingActive: $(snd2_processingActive)
      container.azureAppRegistrationEnabled: $(snd2_azureAppRegistrationEnabled)
      container.azureAppRegistrationClientId: $(snd2_azureAppRegistrationClientId)
      container.azureAppRegistrationTenantId: $(snd2_azureAppRegistrationTenantId)
      container.bannerEnabled: $(snd2_bannerEnabled)
      container.bannerHeader: $(snd2_bannerHeader)
      container.bannerText: $(snd2_bannerText)
      container.bannerEmail: $(snd2_bannerEmail)
    dev_params:
      container.processingActive: $(dev_processingActive)
      container.azureAppRegistrationEnabled: $(dev_azureAppRegistrationEnabled)
      container.azureAppRegistrationClientId: $(dev_azureAppRegistrationClientId)
      container.azureAppRegistrationTenantId: $(dev_azureAppRegistrationTenantId)
      container.bannerEnabled: $(dev_bannerEnabled)
      container.bannerHeader: $(dev_bannerHeader)
      container.bannerText: $(dev_bannerText)
      container.bannerEmail: $(dev_bannerEmail)
    test_params:
      container.processingActive: $(test_processingActive)
      container.azureAppRegistrationEnabled: $(test_azureAppRegistrationEnabled)
      container.azureAppRegistrationClientId: $(test_azureAppRegistrationClientId)
      container.azureAppRegistrationTenantId: $(test_azureAppRegistrationTenantId)
      container.bannerEnabled: $(test_bannerEnabled)
      container.bannerHeader: $(test_bannerHeader)
      container.bannerText: $(test_bannerText)
      container.bannerEmail: $(test_bannerEmail)
    pre_params:
      container.processingActive: $(pre_processingActive)
      container.azureAppRegistrationEnabled: $(pre_azureAppRegistrationEnabled)
      container.azureAppRegistrationClientId: $(pre_azureAppRegistrationClientId)
      container.azureAppRegistrationTenantId: $(pre_azureAppRegistrationTenantId)
      container.bannerEnabled: $(pre_bannerEnabled)
      container.bannerHeader: $(pre_bannerHeader)
      container.bannerText: $(pre_bannerText)
      container.bannerEmail: $(pre_bannerEmail)
    prd_params:
      container.processingActive: $(prd_processingActive)
      container.azureAppRegistrationEnabled: $(prd_azureAppRegistrationEnabled)
      container.azureAppRegistrationClientId: $(prd_azureAppRegistrationClientId)
      container.azureAppRegistrationTenantId: $(prd_azureAppRegistrationTenantId)
      container.bannerEnabled: $(prd_bannerEnabled)
      container.bannerHeader: $(prd_bannerHeader)
      container.bannerText: $(prd_bannerText)
      container.bannerEmail: $(prd_bannerEmail)