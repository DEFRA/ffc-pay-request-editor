# This override file should be used when running automated tests so
# that test output is saved to the host

services:
  ffc-pay-request-editor:
    build:
      target: development
    image: ffc-pay-request-editor-development
    container_name: ffc-pay-request-editor-test
    depends_on:
      - ffc-pay-request-editor-postgres
      - servicebus-emulator
    command: npm run test
    volumes:
      - ./test:/home/node/test
      - ./test-output:/home/node/test-output
      - ./jest.config.js:/home/node/jest.config.js
      - ./package.json:/home/node/package.json
    environment:
      PROCESSING_ACTIVE: true
      MESSAGE_QUEUE_HOST: servicebus-emulator
      MESSAGE_QUEUE_USER: RootManageSharedAccessKey
      MESSAGE_QUEUE_PASSWORD: SAS_KEY_VALUE
      DEBT_TOPIC_ADDRESS: ffc-pay-debt-data-test
      DEBT_SUBSCRIPTION_ADDRESS: ffc-pay-request-editor
      MANUAL_LEDGER_TOPIC_ADDRESS: ffc-pay-manual-check-data-test
      MANUAL_LEDGER_SUBSCRIPTION_ADDRESS: ffc-pay-request-editor
      QC_TOPIC_ADDRESS: ffc-pay-quality-check-test
      EVENTS_TOPIC_ADDRESS: ffc-pay-events-test
      DEBT_RESPONSE_TOPIC_ADDRESS: ffc-pay-debt-data-response-test
    
  ffc-pay-request-editor-postgres:
    volumes:
      - postgres_data:/var/lib/postgresql/data

  sqledge:
    container_name: "sqledge"
    image: "mcr.microsoft.com/azure-sql-edge:latest"
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "DummyStrongPa$$w0rd" # To be filled by user as per policy : https://learn.microsoft.com/en-us/sql/relational-databases/security/strong-passwords?view=sql-server-linux-ver16

  servicebus-emulator:
    container_name: "servicebus-emulator"
    image: mcr.microsoft.com/azure-messaging/servicebus-emulator:latest
    pull_policy: always
    volumes:
      - "./BusConfig.json:/ServiceBus_Emulator/ConfigFiles/Config.json"
    ports:
      - "5672:5672"
    environment:
      SQL_SERVER: sqledge
      MSSQL_SA_PASSWORD: "DummyStrongPa$$w0rd" # Password should be same as what is set for SQL Edge
      ACCEPT_EULA: "Y"
    depends_on:
      - sqledge

    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 5672"]
      interval: 5s
      timeout: 3s
      retries: 30

volumes:
  postgres_data:
